<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neelkamal CHS – Flat Allotment Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0c1a35;--gold:#c8a84b;--gold2:#e8cc7a;
  --bg:#f5f0e8;--card:#fff;--border:#ddd5c0;--text:#1a1a2e;--muted:#7a7060;
  --green:#1a6640;--gbg:#e8f5ee;--gb:#b0d8c0;
  --blue:#1a4b8c;--bbg:#eaf0fc;--bb:#b8ccf0;
  --amber:#9a6b10;--abg:#fff8e5;--amb:#e8cc7a;
  --sh:0 2px 14px rgba(12,26,53,.09);--sh2:0 8px 36px rgba(12,26,53,.16);
}
body{font-family:"Lato",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:30px 20px 24px;text-align:center;position:relative;overflow:hidden}
header::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hdr{position:relative;max-width:700px;margin:0 auto}
.htag{display:inline-block;background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.35);color:var(--gold2);font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:12px}
header h1{font-family:"Playfair Display",serif;color:#fff;font-size:clamp(19px,3.5vw,30px);font-weight:600;line-height:1.28;margin-bottom:5px}
header h1 span{color:var(--gold)}
header p{color:rgba(255,255,255,.48);font-size:13px;font-weight:300}
#sp{max-width:640px;margin:0 auto;padding:30px 18px 48px}
.sw{background:var(--card);border-radius:12px;border:2px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 18px;box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s}
.sw:focus-within{border-color:var(--gold);box-shadow:0 0 0 4px rgba(200,168,75,.12),var(--sh)}
.sw input{border:none;outline:none;flex:1;font-family:"Lato",sans-serif;font-size:16px;color:var(--text);padding:17px 0;background:transparent}
.sw input::placeholder{color:#bbb0a0}
#clr{display:none;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;font-family:"Lato",sans-serif;padding:6px 10px;border-radius:8px;transition:all .15s;white-space:nowrap}
#clr:hover{background:#ece5d8}
.si{color:var(--gold);font-size:20px;flex-shrink:0}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:9px;font-weight:300}
.hint b{color:var(--gold);font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:13px}
.chip{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;font-family:"Lato",sans-serif}
.chip:hover{border-color:var(--gold);color:var(--navy);background:#fdf8ee}
#rs{margin-top:22px;display:none}
.cnt{font-size:11.5px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:11px;font-weight:700}
.cnt em{color:var(--navy);font-style:normal}
.ri{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--sh);transition:all .15s}
.ri:hover{border-color:var(--gold);box-shadow:var(--sh2);transform:translateY(-1px)}
.ri-name{font-family:"Playfair Display",serif;font-size:15px;color:var(--navy);margin-bottom:5px}
.ri-badges{display:flex;flex-wrap:wrap;gap:4px}
.bg{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px}
.bg-old{background:#f0ece2;color:#6b5a2e;border:1px solid #ddd0b0}
.bg-new{background:var(--bbg);color:var(--blue);border:1px solid var(--bb)}
.bg-sp{background:var(--abg);color:var(--amber);border:1px solid var(--amb)}
.arr{color:var(--gold);font-size:20px;flex-shrink:0}
.nores{text-align:center;padding:44px 20px;color:var(--muted)}
.nores .ico{font-size:36px;opacity:.28;margin-bottom:10px}
#dp{max-width:700px;margin:0 auto;padding:22px 18px 60px;display:none}
.back{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;font-family:"Lato",sans-serif;color:var(--navy);cursor:pointer;margin-bottom:20px;transition:all .15s;font-weight:700}
.back:hover{border-color:var(--gold);background:#fdf8ee}
.dc{background:var(--card);border:1.5px solid var(--border);border-radius:16px;box-shadow:var(--sh2);overflow:hidden}
.hero{background:var(--navy);padding:22px 22px 20px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23c8a84b' fill-opacity='.06' d='M0 0h20v20H0zm20 20h20v20H20z'/%3E%3C/svg%3E") repeat;opacity:.5}
.hero-in{position:relative}
.h-ref{font-size:10px;color:rgba(200,168,75,.7);letter-spacing:.13em;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.h-name{font-family:"Playfair Display",serif;color:#fff;font-size:clamp(16px,2.8vw,22px);line-height:1.3;margin-bottom:14px}
.flat-row{display:flex;flex-wrap:wrap;gap:8px}
.fb{background:rgba(255,255,255,.09);border:1px solid rgba(200,168,75,.28);border-radius:10px;padding:10px 14px;min-width:130px;flex:1}
.fb-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.11em;color:rgba(200,168,75,.72);font-weight:700;margin-bottom:3px}
.fb-num{font-family:"Playfair Display",serif;font-size:22px;color:#fff;letter-spacing:.02em}
.fb-type{font-size:11px;color:var(--gold2);margin-top:2px}
.fb-old{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.mg{background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.3);border-radius:8px;padding:9px 13px;font-size:12.5px;color:var(--gold2);margin-top:12px}
.db{padding:22px}
.sec{margin-bottom:22px}
.sec:last-child{margin-bottom:0}
.st{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
.st::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px}
.ifield{background:var(--bg);border-radius:8px;padding:11px 13px;border:1px solid var(--border)}
.ifield .lb{font-size:9.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;margin-bottom:3px}
.ifield .vl{font-size:14px;color:var(--text);line-height:1.3}
.ifield .vl.str{color:var(--navy);font-weight:700;font-size:15px}
.ifield.hl{background:var(--bbg);border-color:var(--bb)}
.ifield.hl .lb{color:#6080b0}
.ifield.hl .vl{color:var(--blue);font-weight:700}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px}
.pb{border-radius:10px;padding:14px 15px;border:1.5px solid}
.pb .lb{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:5px}
.pb .vl{font-size:16px;font-weight:700;line-height:1.2}
.pb-ta{background:#f2f6ff;border-color:var(--bb)} .pb-ta .lb{color:#6080b0} .pb-ta .vl{color:var(--blue)}
.pb-aa{background:var(--abg);border-color:var(--amb)} .pb-aa .lb{color:var(--amber)} .pb-aa .vl{color:var(--amber)}
.pb-tp{background:#f0f6f2;border-color:var(--gb)} .pb-tp .lb{color:#3d6b52} .pb-tp .vl{color:var(--green)}
.pb-ap{background:var(--gbg);border-color:var(--gb)} .pb-ap .lb{color:#3d6b52} .pb-ap .vl{color:var(--green);font-size:19px}
.cr{display:flex;flex-wrap:wrap;gap:10px}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;flex:1;min-width:155px}
.cb .lb{font-size:9.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:700;margin-bottom:3px}
.cb .vl{font-size:13.5px;color:var(--text);word-break:break-all}
mark{background:#fff3a0;border-radius:2px;padding:0 1px}
.sch-table{width:100%;border-collapse:collapse;font-family:"Lato",sans-serif;font-size:13px}
.sch-table th{background:#0c1a35;color:#fff;padding:9px 12px;text-align:left;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.sch-table th:last-child{text-align:right}
.sch-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.sch-table td:last-child{text-align:right;font-weight:700;color:var(--green);white-space:nowrap}
.sch-table tr:nth-child(even) td{background:#faf8f3}
.sch-table tr.due td{background:#e8f5ee}
.sch-table tr.due td:first-child{border-left:3px solid var(--green)}
.sch-table tr.total-row td{background:#0c1a35;color:#fff;font-weight:700;font-size:14px}
.sch-table tr.total-row td:last-child{color:var(--gold2)}
.stg-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#0c1a35;color:#fff;font-size:10px;font-weight:700;margin-right:8px;flex-shrink:0}
.stg-num.due{background:var(--green)}
.pct-pill{display:inline-block;background:#e8f0fc;color:#1a4b8c;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px}
.pct-pill.due{background:#e8f5ee;color:var(--green)}
@media(max-width:480px){#sp,#dp{padding-left:12px;padding-right:12px}.db{padding:14px}.fb{min-width:calc(50% - 4px);flex:none}}
</style>
</head>

let lq = "", lr = [];

function qs(v) { document.getElementById("qi").value = v; run(v); }

function hl(t, q) {
  if (!t || !q) return String(t || "");
  try {
    return String(t).replace(new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi"), "<mark>$1</mark>");
  } catch(e) { return String(t); }
}

function inr(v) { return (v != null) ? "\u20B9" + Number(v).toLocaleString("en-IN") : "\u2014"; }
function sqf(v) { return (v != null) ? v + " sq.ft." : "\u2014"; }
function na(v)  { return (v != null && v !== "") ? v : '<span style="color:#c0b0a0">Not available</span>'; }

function run(q) {
  q = (q || "").trim();
  lq = q;
  var rs = document.getElementById("rs");
  var clr = document.getElementById("clr");
  if (!q) { rs.style.display = "none"; clr.style.display = "none"; return; }
  clr.style.display = "inline-block";
  var qu = q.toUpperCase().replace(/\s/g, "");
  lr = D.filter(function(r) {
    var nm = (r.name || "").toUpperCase();
    var of = (r.old  || "").toUpperCase().replace(/\s/g, "");
    var n1 = (r.n1   || "").toUpperCase();
    var n2 = (r.n2   || "").toUpperCase();
    var n3 = (r.n3   || "").toUpperCase();
    return nm.indexOf(q.toUpperCase()) >= 0 || of.indexOf(qu) >= 0 ||
           n1.indexOf(qu) >= 0 || n2.indexOf(qu) >= 0 || n3.indexOf(qu) >= 0;
  });
  rs.style.display = "block";
  document.getElementById("cnt").innerHTML = "<em>" + lr.length + "</em> record" + (lr.length !== 1 ? "s" : "") + " found";
  if (!lr.length) {
    document.getElementById("lst").innerHTML = '<div class="nores"><div class="ico">&#128269;</div><p>No results for &ldquo;<strong>' + q + '</strong>&rdquo;</p></div>';
    return;
  }
  var html = "";
  for (var i = 0; i < lr.length; i++) {
    var r = lr[i];
    var nf = [r.n1, r.n2, r.n3].filter(Boolean);
    var nb = nf.map(function(f){ return '<span class="bg bg-new">&#127968; ' + hl(f, lq) + '</span>'; }).join("");
    var sb = r.merge ? '<span class="bg bg-sp">&#128279; Split/Merge</span>' : "";
    html += '<div class="ri" onclick="showDetail(' + i + ')">'
         +  '<div><div class="ri-name">' + hl(r.name, lq) + '</div>'
         +  '<div class="ri-badges"><span class="bg bg-old">&#128196; ' + hl(r.old, lq) + '</span>' + nb + sb + '</div></div>'
         +  '<span class="arr">&#8250;</span></div>';
  }
  document.getElementById("lst").innerHTML = html;
}

var STAGES = [
  { label: "Upon finalization of plan (Commitment Amount)",          pct: 5,   due: true  },
  { label: "On IOD",                                                  pct: 5,   due: false },
  { label: "On Plinth CC",                                            pct: 10,  due: false },
  { label: "On completion of plinth work",                            pct: 25,  due: false },
  { label: "On completion of each slab @ 1% per slab (Approx. 30 slabs)", pct: 30, due: false },
  { label: "On commencement of internal wall work",                   pct: 6.5, due: false },
  { label: "On commencement of electrical work",                      pct: 6.5, due: false },
  { label: "On commencement of finishing work",                       pct: 6.5, due: false },
  { label: "On OC",                                                   pct: 5.5, due: false },
];

function paySchedule(total) {
  var rows = "";
  var cumulative = 0;
  for (var i = 0; i < STAGES.length; i++) {
    var s = STAGES[i];
    var amt = Math.round(total * s.pct / 100);
    cumulative += amt;
    var isDue = s.due;
    rows += '<tr class="' + (isDue ? "due" : "") + '">'
          + '<td><span class="stg-num' + (isDue ? " due" : "") + '">' + (i+1) + '</span>'
          + s.label
          + '<span class="pct-pill' + (isDue ? " due" : "") + '">' + s.pct + '%</span>'
          + (isDue ? ' <strong style="color:var(--green);font-size:11px">&nbsp;&#9650; Due Now</strong>' : '')
          + '</td>'
          + '<td>' + "\u20B9" + Number(amt).toLocaleString("en-IN") + '</td>'
          + '</tr>';
  }
  rows += '<tr class="total-row">'
        + '<td><strong>TOTAL</strong></td>'
        + '<td>\u20B9' + Number(total).toLocaleString("en-IN") + '</td>'
        + '</tr>';

  return '<div class="sec"><div class="st">Stage-wise Payment Schedule (Based on Your Total Purchase Value)</div>'
       + '<div style="overflow-x:auto">'
       + '<table class="sch-table">'
       + '<thead><tr><th>Stage</th><th>Amount (&#8377;)</th></tr></thead>'
       + '<tbody>' + rows + '</tbody>'
       + '</table>'
       + '<p style="font-size:11px;color:var(--muted);margin-top:8px">Note: Stage 1 (Commitment Amount) is due immediately upon flat allocation. Stamp Duty, GST &amp; Registration charges are payable extra by the member.</p>'
       + '</div></div>';
}

function showDetail(i) {
  var r = lr[i];
  var nf = [r.n1, r.n2, r.n3].filter(Boolean);

  var fbs = "";
  for (var j = 0; j < nf.length; j++) {
    fbs += '<div class="fb">'
        +  '<div class="fb-lbl">New Flat' + (nf.length > 1 ? " " + (j+1) : "") + '</div>'
        +  '<div class="fb-num">' + nf[j] + '</div>'
        +  '<div class="fb-old">Old: ' + (r.old || "—") + '</div>'
        +  '</div>';
  }

  var mg = r.merge ? '<div class="mg">&#128279; ' + r.merge + '</div>' : "";

  document.getElementById("dc").innerHTML =
    '<div class="hero"><div class="hero-in">'
  +   '<div class="h-name">' + (r.name || "") + '</div>'
  +   '<div class="flat-row">' + fbs + '</div>'
  +   mg
  + '</div></div>'
  + '<div class="db">'

  + '<div class="sec"><div class="st">Property Details</div><div class="ig">'
  +   '<div class="ifield"><div class="lb">Old / Existing Flat No.</div><div class="vl str">' + (r.old || "—") + '</div></div>'
  +   '<div class="ifield"><div class="lb">Share Certificate No.</div><div class="vl">' + (r.cert != null ? r.cert : "—") + '</div></div>'
  +   '<div class="ifield"><div class="lb">Existing MOFA Area</div><div class="vl">' + sqf(r.mofa) + '</div></div>'
  +   '<div class="ifield hl"><div class="lb">Final RERA Area</div><div class="vl">' + sqf(r.eRera) + '</div></div>'
  + '</div></div>'

  + '<div class="sec"><div class="st">Area &amp; Payment Summary</div><div class="pg">'
  +   '<div class="pb pb-ta"><div class="lb">Total Area Purchased</div><div class="vl">' + sqf(r.ta) + '</div></div>'
  +   '<div class="pb pb-aa"><div class="lb">Additional Area Purchased</div><div class="vl">' + sqf(r.aa) + '</div></div>'
  +   '<div class="pb pb-tp"><div class="lb">Total Purchase Value</div><div class="vl">' + inr(r.tp) + '</div></div>'
  +   '<div class="pb pb-ap"><div class="lb">Allotment Payment (5%) — Due Now</div><div class="vl">' + inr(r.ap) + '</div></div>'
  + '</div></div>'

  + (r.tp ? paySchedule(r.tp) : '')


  + '<div class="sec"><div class="st">Contact Details</div><div class="cr">'
  +   '<div class="cb"><div class="lb">Mobile Number</div><div class="vl">' + na(r.mob) + '</div></div>'
  +   '<div class="cb"><div class="lb">Email ID</div><div class="vl">' + na(r.email) + '</div></div>'
  + '</div></div>'

  + '</div>';

  document.getElementById("sp").style.display = "none";
  document.getElementById("dp").style.display = "block";
  window.scrollTo({top: 0, behavior: "smooth"});
}

function goBack() {
  document.getElementById("dp").style.display = "none";
  document.getElementById("sp").style.display = "block";
  window.scrollTo({top: 0, behavior: "smooth"});
}

document.getElementById("qi").addEventListener("input", function(e){ run(e.target.value); });
document.getElementById("clr").addEventListener("click", function(){
  document.getElementById("qi").value = "";
  document.getElementById("rs").style.display = "none";
  document.getElementById("clr").style.display = "none";
  lq = ""; lr = [];
});
